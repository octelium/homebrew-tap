name: Update Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Tag (e.g. v1.2.3)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Version
        id: resolve
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            echo "No version provided. Fetching latest from octelium repo..."
            TAG=$(curl -fsSL https://raw.githubusercontent.com/octelium/octelium/refs/heads/main/unsorted/latest_release | tr -d '[:space:]')
          else
            TAG="${{ github.event.inputs.version }}"
          fi
          
          if [ -z "$TAG" ]; then
            echo "Error: Failed to resolve tag."
            exit 1
          fi
          
          CLEAN_VERSION=${TAG#v}
          
          echo "Target tag: $TAG"
          echo "Clean version: $CLEAN_VERSION"
          
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

      - name: Download Checksums
        run: |
          CHECKSUM_URL="https://github.com/octelium/octelium/releases/download/${TAG}/SHA256SUMS"
          echo "Downloading checksums from $CHECKSUM_URL"
          curl -fsSL "$CHECKSUM_URL" -o SHA256SUMS
          
          if [ ! -s SHA256SUMS ]; then
            echo "Error: Checksums file is empty or missing!"
            exit 1
          fi

      - name: Generate Formula from Template
        run: |
          for BIN in octelium octeliumctl octops; do
            for OS in darwin linux; do
              for ARCH in amd64 arm64; do
                
                VAR_NAME="SHA_${BIN}_${OS}_${ARCH}"
                VAR_NAME=$(echo "$VAR_NAME" | tr '[:lower:]' '[:upper:]')
                
                FILE_NAME="${BIN}-${OS}-${ARCH}.tar.gz"
                
                SHA=$(grep -E "(^|[[:space:]])${FILE_NAME}($|[[:space:]])" SHA256SUMS | awk '{print $1}')
                
                if [ -z "$SHA" ]; then
                  echo "Error: Could not find checksum for $FILE_NAME in SHA256SUMS"
                  exit 1
                fi
                
                export $VAR_NAME="$SHA"
                echo "Found $VAR_NAME = $SHA"
                
              done
            done
          done

          envsubst < Formula/octelium.rb.tmpl > Formula/octelium.rb
          
          echo "Successfully generated Formula/octelium.rb"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Formula/octelium.rb
          
          if git diff --staged --quiet; then
            echo "Formula is already up to date. Nothing to commit."
          else
            git commit -m "Update octelium to ${TAG}"
            git push
            echo "Pushed update to tap repository."
          fi